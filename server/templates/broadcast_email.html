<!DOCTYPE html>
<html>

<head>
    <title>{{subject}}</title>
</head>

<body style="background-color: #f4f4f4; padding: 40px;">
    <div
        style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">

        <h2 style="color: #c41e3a; text-align: center;">Jai Gurudev</h2>

        <p style="color: #333; line-height: 1.6;">Dear,</p>

        <div style="color: #333; line-height: 1.6; padding: 10px 0;">
            {{message}}
        </div>

        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">

        <p style="font-size: 12px; color: #666; text-align: center;">
            This message was sent from the Jai Gurudev Ashram Website.<br>
            Ujjain Ashram, Maksi Road, Ujjain (M.P.), India
        </p>
    </div>
</body>

</html>
